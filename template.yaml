AWSTemplateFormatVersion: '2010-09-09'
Description: ShareBite 603AZ serverless backend using an existing AWS Academy LabRole.

Parameters:
  ExistingLambdaRoleArn:
    Type: String
    Default: arn:aws:iam::126749442836:role/LabRole
    Description: Existing AWS Academy Lambda execution role ARN.

  ProjectName:
    Type: String
    Default: sharebite603clean
    AllowedPattern: '^[a-z][a-z0-9-]{2,30}$'
    Description: Lowercase prefix for resource names.

Resources:
  FoodListingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${ProjectName}-food-listings'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: listingId
          AttributeType: S
      KeySchema:
        - AttributeName: listingId
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: ShareBite
        - Key: Module
          Value: 603AZ

  DonationNotificationsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${ProjectName}-donation-notifications'
      DisplayName: ShareBite Donations
      Tags:
        - Key: Project
          Value: ShareBite
        - Key: Module
          Value: 603AZ

  BackendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-backend'
      RetentionInDays: 14

  BackendFunction:
    Type: AWS::Lambda::Function
    DependsOn: BackendLogGroup
    Properties:
      FunctionName: !Sub '${ProjectName}-backend'
      Description: ShareBite food-listing API backend.
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !Ref ExistingLambdaRoleArn
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          TABLE_NAME: !Ref FoodListingsTable
          SNS_TOPIC_ARN: !Ref DonationNotificationsTopic
      Code:
        ZipFile: |
          import json
          import os
          import uuid
          from datetime import datetime, timezone

          import boto3
          from botocore.exceptions import ClientError

          dynamodb = boto3.resource("dynamodb")
          sns = boto3.client("sns")
          table = dynamodb.Table(os.environ["TABLE_NAME"])
          topic_arn = os.environ.get("SNS_TOPIC_ARN", "")

          def make_response(status_code, body):
              return {
                  "statusCode": status_code,
                  "headers": {
                      "Content-Type": "application/json"
                  },
                  "body": json.dumps(body, default=str)
              }

          def request_method(event):
              return (
                  event.get("requestContext", {})
                       .get("http", {})
                       .get("method", "")
                       .upper()
              )

          def parse_body(event):
              raw_body = event.get("body") or "{}"
              if event.get("isBase64Encoded"):
                  import base64
                  raw_body = base64.b64decode(raw_body).decode("utf-8")
              return json.loads(raw_body)

          def lambda_handler(event, context):
              request_id = getattr(context, "aws_request_id", "unknown")

              try:
                  method = request_method(event)

                  if method == "GET":
                      result = table.scan()
                      items = result.get("Items", [])
                      items.sort(
                          key=lambda item: item.get("createdAt", ""),
                          reverse=True
                      )
                      return make_response(200, items)

                  if method == "POST":
                      data = parse_body(event)

                      required_fields = [
                          "foodName",
                          "quantity",
                          "location",
                          "expiryTime",
                          "donorName",
                          "contactNumber"
                      ]

                      missing_fields = [
                          field for field in required_fields
                          if not str(data.get(field, "")).strip()
                      ]

                      if missing_fields:
                          return make_response(400, {
                              "message": "Required fields are missing.",
                              "missingFields": missing_fields
                          })

                      item = {
                          "listingId": str(uuid.uuid4()),
                          "foodName": str(data["foodName"]).strip(),
                          "quantity": str(data["quantity"]).strip(),
                          "location": str(data["location"]).strip(),
                          "expiryTime": str(data["expiryTime"]).strip(),
                          "donorName": str(data["donorName"]).strip(),
                          "contactNumber": str(data["contactNumber"]).strip(),
                          "status": "Available",
                          "createdAt": datetime.now(timezone.utc).isoformat()
                      }

                      table.put_item(
                          Item=item,
                          ConditionExpression="attribute_not_exists(listingId)"
                      )

                      notification_status = "not published"
                      try:
                          sns.publish(
                              TopicArn=topic_arn,
                              Subject="New ShareBite food donation",
                              Message=(
                                  f"Food: {item['foodName']}\n"
                                  f"Quantity: {item['quantity']}\n"
                                  f"Location: {item['location']}\n"
                                  f"Expiry: {item['expiryTime']}"
                              )
                          )
                          notification_status = "published"
                      except ClientError as sns_error:
                          print("SNS warning:", str(sns_error))

                      return make_response(201, {
                          "message": "Food listing added successfully.",
                          "item": item,
                          "notification": notification_status
                      })

                  return make_response(405, {
                      "message": "Method not allowed."
                  })

              except json.JSONDecodeError:
                  return make_response(400, {
                      "message": "Request body must be valid JSON."
                  })
              except ClientError as error:
                  print("AWS client error:", str(error))
                  return make_response(500, {
                      "message": "An AWS service error occurred.",
                      "requestId": request_id
                  })
              except Exception as error:
                  print("Unhandled error:", str(error))
                  return make_response(500, {
                      "message": "Internal server error.",
                      "requestId": request_id
                  })

  ShareBiteHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${ProjectName}-http-api'
      Description: ShareBite 603AZ HTTP API.
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - content-type
        MaxAge: 3600
      Tags:
        Project: ShareBite
        Module: 603AZ

  BackendIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ShareBiteHttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt BackendFunction.Arn
      IntegrationMethod: POST
      PayloadFormatVersion: '2.0'
      TimeoutInMillis: 15000

  GetFoodRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ShareBiteHttpApi
      RouteKey: 'GET /food'
      AuthorizationType: NONE
      Target: !Sub 'integrations/${BackendIntegration}'

  PostFoodRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ShareBiteHttpApi
      RouteKey: 'POST /food'
      AuthorizationType: NONE
      Target: !Sub 'integrations/${BackendIntegration}'

  ProdStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref ShareBiteHttpApi
      StageName: prod
      AutoDeploy: true
      DefaultRouteSettings:
        DetailedMetricsEnabled: true
        ThrottlingBurstLimit: 20
        ThrottlingRateLimit: 10
      Tags:
        Project: ShareBite
        Module: 603AZ

  ApiGatewayInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref BackendFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${ShareBiteHttpApi}/*/*/food'

  FrontendFilesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Project
          Value: ShareBite
        - Key: Module
          Value: 603AZ

Outputs:
  FoodApiUrl:
    Description: Copy this URL into the frontend JavaScript.
    Value: !Sub 'https://${ShareBiteHttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod/food'

  ApiBaseUrl:
    Value: !Sub 'https://${ShareBiteHttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod'

  LambdaFunctionName:
    Value: !Ref BackendFunction

  LambdaFunctionArn:
    Value: !GetAtt BackendFunction.Arn

  DynamoDBTableName:
    Value: !Ref FoodListingsTable

  DynamoDBTableArn:
    Value: !GetAtt FoodListingsTable.Arn

  SnsTopicArn:
    Value: !Ref DonationNotificationsTopic

  FrontendBucketName:
    Value: !Ref FrontendFilesBucket
